<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trivia Fridays — Poll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Barlow:wght@400;500;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="page-poll">

<a class="skip-link" href="#main">Skip to content</a>
<div class="bulbs" aria-hidden="true"></div>

<header class="deck">
  <a href="index.html" class="deck-brand"><span>Trivia</span><span>Fridays</span></a>
  <nav class="deck-nav" aria-label="Main">
    <a href="index.html" class="nav-link">Leaderboard</a>
    <a href="poll.html" class="nav-link is-active">Poll</a>
    <a href="play.html" class="nav-link">Play</a>
    <a href="host.html" class="nav-link" id="nav-host" hidden>Host</a>
    <a href="present.html" class="nav-link" id="nav-present" hidden>Present</a>
    <a href="admin.html" class="nav-link" id="nav-admin" hidden>Admin</a>
  </nav>
  <button type="button" class="sound-toggle" id="sound-toggle" aria-pressed="false">Sound off</button>
</header>

<div class="page-strip">
  <h1 class="page-name">Poll</h1>
  <p class="tagline" id="tagline">Checking who you are…</p>
</div>

<main id="main">

<!-- ================= LOCKED / MESSAGE ================= -->
<section id="view-locked" class="view card-stage" hidden>
  <div class="marquee-card">
    <h2 class="card-title">Hang on</h2>
    <p class="hint" id="locked-message"></p>
  </div>
</section>

<!-- ================= POLL ================= -->
<section id="view-poll" class="view poll-view" hidden>
  <p class="hint host-note" id="host-note" hidden>You're hosting this one, so you sit out the vote — here's how it's tracking.</p>

  <div class="poll-options" id="poll-options"></div>

  <p class="error" id="poll-error" hidden></p>
</section>

</main>

<script type="module" src="sound.js"></script>
<script type="module" src="poll.js"></script>
</body>
</html>

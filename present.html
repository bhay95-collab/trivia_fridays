<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trivia Fridays — Present</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://rbkmluzoxowqftjzzsbm.supabase.co" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Barlow:wght@400;500;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="page-present">

<a class="skip-link" href="#main">Skip to content</a>
<div class="bulbs" aria-hidden="true"></div>
<div class="synth-horizon" aria-hidden="true">
  <div class="synth-stars"></div>
  <div class="synth-sun"></div>
  <div class="synth-glow"></div>
  <div class="synth-grid"></div>
</div>

<header class="deck">
  <a href="index.html" class="deck-brand"><span>Trivia</span><span>Fridays</span></a>
  <nav class="deck-nav" aria-label="Main">
    <a href="index.html" class="nav-link">Leaderboard</a>
    <a href="poll.html" class="nav-link">Poll</a>
    <a href="play.html" class="nav-link">Play</a>
    <a href="host.html" class="nav-link" id="nav-host" hidden>Host</a>
    <a href="present.html" class="nav-link is-active" id="nav-present" hidden>Present</a>
    <a href="admin.html" class="nav-link" id="nav-admin" hidden>Admin</a>
  </nav>
  <button type="button" class="sound-toggle" id="sound-toggle" aria-pressed="false">Sound off</button>
</header>

<div class="page-strip">
  <h1 class="page-name">Present</h1>
  <p class="tagline" id="tagline">Checking who you are…</p>
</div>

<main id="main">

<!-- ================= LOCKED / MESSAGE ================= -->
<section id="view-locked" class="view card-stage" hidden>
  <div class="marquee-card">
    <h2 class="card-title">Nothing to present</h2>
    <p class="hint" id="locked-message"></p>
  </div>
</section>

<!-- ================= PRESENT ================= -->
<section id="view-present" class="view" hidden>

  <label class="field" id="week-switcher-field" hidden>
    <span>Managing</span>
    <select id="week-switcher"></select>
  </label>

  <!-- ready to start -->
  <section class="card-stage" id="ready-panel" hidden>
    <div class="marquee-card">
      <h2 class="card-title" id="ready-heading">Ready when you are</h2>
      <p class="hint" id="ready-meta"></p>
      <button type="button" class="btn btn-gold" id="start-week-btn">Start the quiz</button>
      <p class="error" id="ready-error" hidden></p>
      <p class="attract">▸ Press start</p>
    </div>
  </section>

  <!-- live driving screen - this is what the room sees on Teams.
       Nothing here ever shows a correct answer or another player's
       response - that only happens once the quiz is closed. -->
  <section id="live-panel" hidden>
    <h1 class="present-prompt" id="present-prompt"></h1>

    <div class="media-stack" id="present-media" hidden></div>

    <div class="present-options" id="present-options" hidden></div>

    <p class="hint" id="live-hint" style="text-align:center"></p>
    <p class="error" id="live-error" style="text-align:center" hidden></p>

    <!-- the host's physical controls, pinned along the bottom -->
    <div class="control-deck">
      <button type="button" class="btn btn-small" id="present-prev">&larr; Prev</button>
      <span class="present-progress" id="present-progress"></span>
      <button type="button" class="btn btn-small" id="present-next">Next &rarr;</button>

      <div class="answer-meter" id="answer-meter" hidden>
        <div class="answer-meter-bar"><div class="answer-meter-fill" id="answer-meter-fill"></div></div>
        <span class="answer-meter-label" id="answer-meter-label"></span>
      </div>

      <span class="answer-meter-label" id="submitted-meta"></span>
      <button type="button" class="btn btn-small" id="end-quiz-btn">End the quiz</button>
    </div>
  </section>

  <!-- after the quiz: safe to show answers and review together -->
  <section id="review-panel" hidden>
    <section class="panel">
      <h2 class="panel-title">Answer review</h2>
      <div class="play-nav">
        <button type="button" class="btn btn-small" id="review-prev">&larr; Prev</button>
        <span class="present-progress" id="review-progress"></span>
        <button type="button" class="btn btn-small" id="review-next">Next &rarr;</button>
      </div>
      <p class="present-prompt review-prompt" id="review-prompt"></p>
      <p class="reveal-answer" id="review-answer"></p>
      <p class="error" id="review-error" hidden></p>
      <ul class="override-list" id="override-list"></ul>
    </section>
  </section>

  <!-- the big moment: its own zone so the house lights can dim
       around it while the podium takes the stage -->
  <section class="podium-zone" id="podium-panel" hidden>
    <div class="stage">
      <span class="stage-label">Quiz podium</span>
      <div class="reveal-cta">
        <p class="hint" id="review-gate-hint" hidden></p>
        <button type="button" class="btn btn-gold" id="reveal-podium-btn">Reveal the winners</button>
      </div>
      <div class="podium is-reveal" id="present-podium"></div>
    </div>
    <div class="screen">
      <ol class="rankings" id="present-rest"></ol>
    </div>
  </section>

</section>

</main>

<div class="reaction-field" id="reaction-field" aria-hidden="true"></div>
<canvas id="confetti" aria-hidden="true"></canvas>

<script type="module" src="sound.js"></script>
<script type="module" src="present.js"></script>
</body>
</html>

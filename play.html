<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trivia Fridays — Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bulbs" aria-hidden="true"></div>

<nav class="site-nav">
  <a href="index.html" class="nav-link">Leaderboard</a>
  <a href="poll.html" class="nav-link">Poll</a>
  <a href="play.html" class="nav-link is-active">Play</a>
  <a href="host.html" class="nav-link" id="nav-host" hidden>Host</a>
  <a href="present.html" class="nav-link" id="nav-present" hidden>Present</a>
  <a href="admin.html" class="nav-link" id="nav-admin" hidden>Admin</a>
</nav>

<header class="masthead masthead-admin">
  <p class="eyebrow">Trivia Fridays</p>
  <h1 class="wordmark wordmark-sm"><span>Play</span></h1>
  <p class="tagline" id="tagline">Checking who you are…</p>
</header>

<!-- ================= LOCKED / MESSAGE ================= -->
<section id="view-locked" class="view card-stage" hidden>
  <div class="marquee-card">
    <h2 class="card-title">Hang on</h2>
    <p class="hint" id="locked-message"></p>
  </div>
</section>

<!-- ================= PLAY ================= -->
<section id="view-play" class="view play-view" hidden>

  <!-- waiting for the first question -->
  <div id="waiting-block" hidden>
    <p class="hint" id="waiting-message">Waiting for the host…</p>
  </div>

  <!-- browsing and answering open questions -->
  <div id="browse-block" hidden>
    <div class="play-nav">
      <button type="button" class="btn btn-small" id="play-prev">&larr; Prev</button>
      <span class="play-progress" id="play-progress"></span>
      <button type="button" class="btn btn-small" id="play-next">Next &rarr;</button>
    </div>

    <h2 class="play-prompt" id="play-prompt"></h2>

    <div class="poll-options" id="mc-options" hidden></div>

    <form id="text-answer-form" class="text-answer-form" hidden>
      <label class="field">
        <span>Your answer</span>
        <input id="text-answer-input" type="text" autocomplete="off">
      </label>
      <button type="submit" class="btn btn-primary">Save answer</button>
    </form>

    <p class="hint" id="answer-status"></p>
    <p class="error" id="play-error" hidden></p>

    <div class="submit-bar">
      <p class="hint" id="answered-count"></p>
      <button type="button" class="btn btn-primary" id="submit-final-btn">Submit my final answers</button>
    </div>
  </div>

  <!-- after this player has submitted -->
  <div id="results-block" hidden>
    <h2 class="card-title">Your results</h2>
    <p class="hint" id="results-total"></p>
    <ol class="results-list" id="results-list"></ol>
  </div>

  <div class="panel" id="standings-panel" hidden>
    <h2 class="panel-title">Standings so far</h2>
    <ol class="rankings" id="play-standings"></ol>
  </div>

  <!-- the night ended and this player never answered anything -->
  <div id="over-block" hidden class="card-stage">
    <div class="marquee-card">
      <h2 class="card-title">That's the night!</h2>
      <p class="hint">You didn't submit any answers this week. Check the leaderboard for the standings.</p>
      <a class="btn btn-primary" href="index.html">Leaderboard</a>
    </div>
  </div>

</section>

<script type="module" src="play.js"></script>
</body>
</html>
